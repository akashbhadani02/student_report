<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Student Progress Report</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
}

.dark{
background:#111827;
color:white;
}

.dark .container{
background:#1f2937;
}

h1{
text-align:center;
}

.info{
display:flex;
gap:20px;
}

.info div{
flex:1;
}

input,
textarea,
select{
width:100%;
padding:10px;
box-sizing:border-box;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,
td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#3498db;
color:white;
}

.buttons{
margin-top:20px;
text-align:center;
}

button{
padding:10px 18px;
margin:5px;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
}

.save{
background:#16a085;
}

.export{
background:#27ae60;
}

.import{
background:#2980b9;
}

.print{
background:#e67e22;
}

.delete{
background:#e74c3c;
}

.darkbtn{
background:black;
}

@media(max-width:700px){

.info{
flex-direction:column;
}

button{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<h1>
Student Progress Report
</h1>

<select
id="studentList"
onchange="loadSelected()">

<option>
Select Student
</option>

</select>

<div class="info">

<div>

<label>
Student Name
</label>

<input id="studentName">

</div>

<div>

<label>
Date
</label>

<input
type="date"
id="reportDate">

</div>

</div>

<table>

<tr>

<th>Area</th>

<th>Excellent</th>

<th>Good</th>

<th>Satisfactory</th>

<th>Needs</th>

</tr>

<tbody id="rows">

</tbody>

</table>

<br>

<label>Strengths</label>

<textarea
id="strengths">
</textarea>

<br><br>

<label>Improvement</label>

<textarea
id="improvement">
</textarea>

<br><br>

<label>Teacher Comments</label>

<textarea
id="teacherComments">
</textarea>

<br><br>

<label>Parent Remarks</label>

<textarea
id="parentRemarks">
</textarea>

<br><br>

<div class="info">

<div>

<input
placeholder="Teacher Signature"
id="teacherSignature">

</div>

<div>

<input
placeholder="Parent Signature"
id="parentSignature">

</div>

</div>

<div class="buttons">

<button
class="save"
onclick="saveReport()">

Save

</button>

<button
class="delete"
onclick="deleteStudent()">

Delete

</button>

<button
class="export"
onclick="exportData()">

Export

</button>

<button
class="import"
onclick="file.click()">

Import

</button>

<button
class="print"
onclick="window.print()">

PDF

</button>

<button
class="darkbtn"
onclick="toggleDark()">

Dark

</button>

<input
hidden
type="file"
id="file"
onchange="importData(event)">

</div>

</div>

<script>

const fields=[
"participation",
"homework",
"communication",
"teamwork",
"discipline",
"creativity"
];

rows.innerHTML=
fields
.map(
r=>`

<tr>

<td>${r}</td>

<td><input type=radio name=${r} value=Excellent></td>

<td><input type=radio name=${r} value=Good></td>

<td><input type=radio name=${r} value=Satisfactory></td>

<td><input type=radio name=${r} value=Needs></td>

</tr>

`
)
.join("");

function getRadio(name){

return document
.querySelector(
`input[name="${name}"]:checked`
)
?.value||"";

}

function setRadio(name,val){

document
.querySelector(
`input[name="${name}"][value="${val}"]`
)
?.click();

}

function form(){

return{

studentName:
studentName.value,

reportDate:
reportDate.value,

strengths:
strengths.value,

improvement:
improvement.value,

teacherComments:
teacherComments.value,

parentRemarks:
parentRemarks.value,

teacherSignature:
teacherSignature.value,

parentSignature:
parentSignature.value,

participation:
getRadio(
"participation"
),

homework:
getRadio(
"homework"
),

communication:
getRadio(
"communication"
),

teamwork:
getRadio(
"teamwork"
),

discipline:
getRadio(
"discipline"
),

creativity:
getRadio(
"creativity"
)

};

}

function load(data){

Object
.keys(data)
.forEach(
k=>{

if(
document
.getElementById(k)
)

document
.getElementById(k)
.value=
data[k];

}
);

fields
.forEach(
f=>
setRadio(
f,
data[f]
)
);

}

function refresh(){

let all=
JSON.parse(
localStorage.getItem(
"reports"
)
)||{};

studentList.innerHTML=
"<option>Select Student</option>";

Object
.keys(all)
.forEach(
n=>{

studentList.innerHTML+=
`<option value="${n}">
${n}
</option>`;

});

}

function saveReport(){

if(
!studentName.value
){

alert(
"Enter Student Name"
);

return;

}

let all=
JSON.parse(
localStorage.getItem(
"reports"
)
)||{};

all[
studentName
.value
.toLowerCase()
]=form();

localStorage.setItem(
"reports",
JSON.stringify(
all
));

refresh();

alert(
"Saved"
);

}

function loadSelected(){

let all=
JSON.parse(
localStorage.getItem(
"reports"
)
)||{};

let selected=
studentList.value;

if(
all[
selected
]
)

load(
all[
selected
]
);

}

function deleteStudent(){

let all=
JSON.parse(
localStorage.getItem(
"reports"
)
)||{};

delete all[
studentName
.value
.toLowerCase()
];

localStorage.setItem(
"reports",
JSON.stringify(
all
));

refresh();

alert(
"Deleted"
);

}

function exportData(){

let blob=
new Blob(
[
JSON.stringify(
form(),
null,
2
)
]
);

let a=
document.createElement(
"a"
);

a.href=
URL.createObjectURL(
blob
);

a.download=
"report.json";

a.click();

}

function importData(e){

let r=
new FileReader();

r.onload=
x=>
load(
JSON.parse(
x.target.result
)
);

r.readAsText(
e.target.files[0]
);

}

function toggleDark(){

document.body
.classList
.toggle(
"dark"
);

}

refresh();
~
</script>

</body>
</html>
